name: wtf_shared
description: Shared models, services, theme and widgets for WTF Guru/Trainer apps.
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.8.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.2.2
  intl: ^0.19.0
  uuid: ^4.5.1
  equatable: ^2.0.7
  collection: ^1.19.0
  hmssdk_flutter: ^1.11.1
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  share_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
